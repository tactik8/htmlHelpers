{{#each this}}

<form class="row g-3">


<div class="mb-3">

    <div class="row mb-3">
        <div class="col">
            <label for="givenName" class="form-label">Email address</label>
            <input id="givenName"  type="text" class="form-control" placeholder="John" aria-label="First name" name="givenName">
        </div>
        <div class="col">
            <label for="familyName" class="form-label">Email address</label>
            <input id="familyName" type="text" class="form-control" placeholder="Smith" aria-label="Last name" name="familyName">
        </div>
    </div>

    <div class="mb-3">
        <label for="exampleInputEmail1" class="form-label">Email address</label>
        <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="john@smith.com" >
        <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
    </div>



    <div class="mb-3">
        <label for="exampleInputPassword1" class="form-label">Password</label>
        <input type="password" class="form-control" id="exampleInputPassword1">
    </div>

    
    <div class="col-12">
        <label for="inputAddress" class="form-label">Address</label>
        <input type="text" class="form-control" id="inputAddress" placeholder="1234 Main St">
      </div>
      <div class="col-12">
        <label for="inputAddress2" class="form-label">Address 2</label>
        <input type="text" class="form-control" id="inputAddress2" placeholder="Apartment, studio, or floor">
      </div>
      <div class="col-md-6">
        <label for="inputCity" class="form-label">City</label>
        <input type="text" class="form-control" id="inputCity">
      </div>
      <div class="col-md-4">
        <label for="inputState" class="form-label">State</label>
        <select id="inputState" class="form-select">
          <option selected>Choose...</option>
          <option>...</option>
        </select>
      </div>
      <div class="col-md-2">
        <label for="inputZip" class="form-label">Zip</label>
        <input type="text" class="form-control" id="inputZip">
      </div>
      <div class="col-12">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="gridCheck">
          <label class="form-check-label" for="gridCheck">
            Check me out
          </label>
        </div>
      </div>


    <div class="col-12">
        <button type="submit" class="btn btn-primary">Sign in</button>
      </div>
    
    <button type="submit" class="btn btn-primary">Submit</button>
</form>
</div>
{{/each}}
